name: 检测上游更新并通知

# 这个工作流只负责检测更新并创建 Issue 通知
# 实际翻译需要用户在本地运行 sync-upstream.sh

on:
  schedule:
    # 每周一 10:00 UTC (18:00 北京时间) 检查一次
    - cron: '0 10 * * 1'
  workflow_dispatch:

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 添加上游远程仓库
        run: |
          git remote add upstream https://github.com/VoltAgent/awesome-openclaw-skills.git
          git fetch upstream main --depth=1

      - name: 检查变更
        id: changes
        run: |
          # 获取变更的分类文件
          CHANGED=$(git diff --name-only HEAD..upstream/main 2>/dev/null | grep "^categories/" | grep "\.md$" | grep -v "\.zh\.md$" || echo "")
          
          if [ -z "$CHANGED" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "✅ 分类文件无变更"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "📝 发现变更:"
            echo "$CHANGED"
            
            # 保存到文件
            echo "$CHANGED" > changed-files.txt
            
            # 生成变更列表
            echo "## 变更文件列表" > change-summary.md
            echo "" >> change-summary.md
            echo '```' >> change-summary.md
            echo "$CHANGED" >> change-summary.md
            echo '```' >> change-summary.md
            echo "" >> change-summary.md
            echo "## 下一步操作" >> change-summary.md
            echo "" >> change-summary.md
            echo "请在本地仓库运行：" >> change-summary.md
            echo "" >> change-summary.md
            echo '```bash' >> change-summary.md
            echo "cd /Volumes/myDisk/workplace/awesome-openclaw-skills-zh" >> change-summary.md
            echo "./scripts/sync-upstream.sh" >> change-summary.md
            echo '```' >> change-summary.md
            echo "" >> change-summary.md
            echo "这将：" >> change-summary.md
            echo "1. 拉取上游最新变更" >> change-summary.md
            echo "2. 识别需要重新翻译的文件" >> change-summary.md
            echo "3. 使用 Claude Code 自动重新翻译" >> change-summary.md
            echo "4. 完成后提交翻译结果" >> change-summary.md
          fi

      - name: 创建 Issue 通知
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: '[同步通知] 上游仓库有更新需要重新翻译 - ${{ steps.changes.outputs.changed_count }}'
          content-filepath: ./change-summary.md
          labels: sync,translation-needed
          assignees: Rito-w

      - name: 无变更
        if: steps.changes.outputs.has_changes == 'false'
        run: echo "✅ 无需同步，已是最新状态"
