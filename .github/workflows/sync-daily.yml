name: Daily Sync from Upstream

on:
  schedule:
    # 每天 10:00 UTC (18:00 北京时间)
    - cron: '0 10 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/copy@v4
        with:
          repository: Rito-w/awesome-openclaw-skills-zh
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/VoltAgent/awesome-openclaw-skills.git
          git fetch upstream main --depth=1

      - name: Check for changes
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD..upstream/main | grep '\.md$' || echo "")
          if [ -z "$CHANGED" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "✅ No changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "📝 Changed files:"
            echo "$CHANGED"
            echo "$CHANGED" > pending-changes.txt
          fi

      - name: Create Issue if changes detected
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-issue-from-file@v4
        with:
          title: '[同步通知] 上游仓库有更新需要翻译'
          content-filepath: ./pending-changes.txt
          labels: sync,translation-needed

      - name: Auto sync (optional)
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          echo "⚠️ 发现变更，请审查后手动合并翻译"
          # 如需自动合并，取消下面注释
          # git merge upstream/main --strategy-option=ours --no-commit
          # git commit -m "chore: sync from upstream (auto)"
          # git push
